spring.application.name=ghost-writer
server.port=${PORT:8080}
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Proxy Configuration (Required for Render OAuth2) ───
server.forward-headers-strategy=framework
server.tomcat.remoteip.internal-proxies=.*

# ─── Gemini AI Configuration ───
# Get your free API key from: https://aistudio.google.com/apikey
# Paste it below to enable AI-powered story suggestions.
# If left empty, the app uses the built-in template engine instead.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.0-flash

# ─── OpenAI-Compatible API Configuration (Fallback) ───
# Works with: OpenAI, Groq, Together AI, OpenRouter, Ollama, etc.
# The app tries Gemini first, then this, then templates.
#
# Groq (free, fast):
openai.api.url=${OPENAI_API_URL:https://api.groq.com/openai/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=${OPENAI_API_MODEL:llama-3.3-70b-versatile}
#
# Ollama (local, no key):
#   openai.api.url=http://localhost:11434/v1/chat/completions
#   openai.api.model=llama3
#
# OpenAI (paid):
#   openai.api.url=https://api.openai.com/v1/chat/completions
#   openai.api.key=sk-...
#   openai.api.model=gpt-3.5-turbo

# ─── MongoDB Configuration ───
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.database=ghostwriter

# ─── GitHub OAuth2 Login ───
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ─── Admin Configuration ───
admin.github.id=${ADMIN_GITHUB_ID:}
